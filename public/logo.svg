<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Transparent background -->

  <!-- Left foot/flipper at bottom -->
  <ellipse cx="175" cy="462" rx="60" ry="28" fill="#F5A623" transform="rotate(-10 175 462)"/>
  <!-- Right foot/flipper at bottom -->
  <ellipse cx="325" cy="462" rx="60" ry="28" fill="#F5A623" transform="rotate(10 325 462)"/>

  <!-- Body - main black shape -->
  <ellipse cx="250" cy="340" rx="140" ry="155" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="3"/>

  <!-- White belly/chest -->
  <ellipse cx="250" cy="345" rx="80" ry="110" fill="#F0EDE6"/>

  <!-- Left wing/flipper -->
  <ellipse cx="115" cy="340" rx="42" ry="90" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="2" transform="rotate(-12 115 340)"/>
  <!-- Right wing/flipper -->
  <ellipse cx="385" cy="340" rx="42" ry="90" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="2" transform="rotate(12 385 340)"/>

  <!-- Head - black circle -->
  <circle cx="250" cy="185" r="130" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="3"/>

  <!-- Hair tuft -->
  <path d="M240 57 Q248 38 255 55 Q260 30 268 52 Q273 28 278 50" stroke="#0D0D1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M240 57 Q248 42 255 58 Q260 36 268 55 Q273 34 278 53" stroke="#1A1A2E" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- White face area -->
  <ellipse cx="250" cy="200" rx="88" ry="98" fill="#F0EDE6"/>

  <!-- Left eye - closed happy curve -->
  <path d="M196 175 Q208 162 220 175" stroke="#1A1A2E" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Right eye - closed happy curve -->
  <path d="M280 175 Q292 162 304 175" stroke="#1A1A2E" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Beak - orange triangle -->
  <polygon points="250,198 228,228 272,228" fill="#F5A623"/>
  <polygon points="250,215 228,228 272,228" fill="#D4860A"/>
  <!-- Beak highlight -->
  <polygon points="250,198 228,228 272,228" fill="none" stroke="#D4860A" stroke-width="1.5"/>

  <!-- Open mouth hint -->
  <path d="M235 224 Q250 234 265 224" fill="#3D1A05" stroke="none"/>

  <!-- Book - left page (open/lighter) -->
  <path d="M145 295 Q175 275 250 285 L250 455 Q175 450 145 465 Z" fill="#E8E0C8" stroke="#2C2416" stroke-width="3"/>
  <!-- Book spine -->
  <rect x="245" y="282" width="10" height="173" fill="#F5A623" rx="2"/>
  <!-- Book - right page/cover (dark) -->
  <path d="M355 295 Q325 275 250 285 L250 455 Q325 450 355 465 Z" fill="#1A1C22" stroke="#0D0D1A" stroke-width="3"/>

  <!-- Book cover decorations (right/dark side) -->
  <rect x="260" y="297" width="85" height="148" fill="#1A1C22" rx="2"/>
  <!-- Golden border on cover -->
  <rect x="263" y="300" width="79" height="142" fill="none" stroke="#C9913D" stroke-width="2.5" rx="2"/>
  <!-- Inner border -->
  <rect x="268" y="305" width="69" height="132" fill="none" stroke="#C9913D" stroke-width="1" rx="1"/>

  <!-- "THE" text -->
  <text x="302" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9913D" font-weight="bold" letter-spacing="2">THE</text>
  <!-- "DARKHOLD" text -->
  <text x="302" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#C9913D" font-weight="bold" letter-spacing="1">DARKHOLD</text>

  <!-- Whisk handle -->
  <line x1="290" y1="410" x2="315" y2="375" stroke="#C9913D" stroke-width="3" stroke-linecap="round"/>
  <!-- Whisk head (loops) -->
  <ellipse cx="285" cy="415" rx="8" ry="10" fill="none" stroke="#C9913D" stroke-width="2.5"/>
  <line x1="280" y1="408" x2="290" y2="408" stroke="#C9913D" stroke-width="2"/>
  <line x1="280" y1="413" x2="290" y2="413" stroke="#C9913D" stroke-width="2"/>

  <!-- Spoon handle -->
  <line x1="315" y1="410" x2="290" y2="375" stroke="#C9913D" stroke-width="3" stroke-linecap="round"/>
  <!-- Spoon head -->
  <ellipse cx="320" cy="415" rx="7" ry="9" fill="none" stroke="#C9913D" stroke-width="2.5"/>
  <ellipse cx="320" cy="415" rx="4" ry="5" fill="#C9913D"/>

  <!-- Sparkles -->
  <text x="268" y="390" font-size="11" fill="#C9913D">✦</text>
  <text x="328" y="395" font-size="10" fill="#C9913D">✦</text>
  <text x="298" y="440" font-size="9" fill="#C9913D">✦</text>
</svg>
