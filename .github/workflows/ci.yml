name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Make sure commit messages follow the conventional commits convention:
  # https://www.conventionalcommits.org
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: darkhold/commitlint.config.mjs

  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: darkhold
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps
      - name: Check formatting
        run: npm run format:check
      - name: Run frontend unit tests
        run: npm test
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Run server unit tests
        run: deno task test

  docker-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./darkhold
          platforms: ${{ matrix.platform }}
          load: true
          tags: darkhold-test
      - name: Start container
        run: docker run -d --name darkhold-test -p 8099:8099 darkhold-test
      - name: Wait for container and Deno backend to be ready
        run: |
          for i in $(seq 1 600); do
            if curl -sf http://localhost:8099/ > /dev/null 2>&1 \
              && curl -sf 'http://localhost:8099/calendar-events?from=2025-01-01&to=2025-01-01' > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to start in 600s"
          docker logs darkhold-test
          exit 1
      - name: Test SPA is served
        run: curl -sf http://localhost:8099/ | grep -q '<html'
      - name: Test WebSocket endpoint
        run: |
          python3 - <<'EOF'
          import base64
          import hashlib
          import json
          import os
          import socket
          import struct
          import sys
          import time

          key = base64.b64encode(os.urandom(16)).decode("ascii")
          req = (
              "GET /ws HTTP/1.1\r\n"
              "Host: localhost:8099\r\n"
              "Upgrade: websocket\r\n"
              "Connection: Upgrade\r\n"
              f"Sec-WebSocket-Key: {key}\r\n"
              "Sec-WebSocket-Version: 13\r\n"
              "\r\n"
          )

          with socket.create_connection(("localhost", 8099)) as sock:
              sock.sendall(req.encode("ascii"))
              sock.settimeout(5)

              # Read the HTTP upgrade response headers
              deadline = time.monotonic() + 10
              buf = b""
              while b"\r\n\r\n" not in buf:
                  if time.monotonic() > deadline:
                      print("timed out waiting for upgrade response headers")
                      sys.exit(1)
                  try:
                      buf += sock.recv(4096)
                  except socket.timeout:
                      pass

              header_part, _, ws_data = buf.partition(b"\r\n\r\n")
              response = header_part.decode("latin1")

              if "101 Switching Protocols" not in response:
                  print(response)
                  sys.exit(1)

              headers = {}
              for line in response.split("\r\n")[1:]:
                  if not line or ":" not in line:
                      continue
                  name, _sep, value = line.partition(":")
                  headers[name.strip().lower()] = value.strip()

              accept = headers.get("sec-websocket-accept")
              if not accept:
                  print(response)
                  sys.exit(1)

              expected_accept = base64.b64encode(
                  hashlib.sha1((key + "258EAFA5-E914-47DA-95CA-C5AB0DC85B11").encode("ascii")).digest()
              ).decode("ascii")
              if accept != expected_accept:
                  print(response)
                  sys.exit(1)

              # Read the first WebSocket frame (version message sent by server on open)
              # Read until we have at least the 2-byte WS frame header
              deadline = time.monotonic() + 10
              while len(ws_data) < 2:
                  if time.monotonic() > deadline:
                      print("timed out waiting for WebSocket frame")
                      sys.exit(1)
                  try:
                      ws_data += sock.recv(4096)
                  except socket.timeout:
                      pass

              b0, b1 = ws_data[0], ws_data[1]
              opcode = b0 & 0x0F
              payload_len = b1 & 0x7F
              offset = 2
              if payload_len == 126:
                  while len(ws_data) < offset + 2:
                      ws_data += sock.recv(4096)
                  payload_len = struct.unpack(">H", ws_data[offset:offset+2])[0]
                  offset += 2
              elif payload_len == 127:
                  while len(ws_data) < offset + 8:
                      ws_data += sock.recv(4096)
                  payload_len = struct.unpack(">Q", ws_data[offset:offset+8])[0]
                  offset += 8

              # Read until we have the full payload
              deadline = time.monotonic() + 10
              while len(ws_data) < offset + payload_len:
                  if time.monotonic() > deadline:
                      print("timed out reading WebSocket payload")
                      sys.exit(1)
                  try:
                      ws_data += sock.recv(4096)
                  except socket.timeout:
                      pass

              if opcode != 1:
                  print(f"expected text frame (opcode 1), got opcode {opcode}")
                  sys.exit(1)

              payload = ws_data[offset:offset+payload_len].decode("utf-8")
              try:
                  msg = json.loads(payload)
              except Exception as e:
                  print(f"version message is not valid JSON: {e!r} — payload: {payload!r}")
                  sys.exit(1)
              if msg.get("type") != "version":
                  print(f"expected type=version, got: {msg!r}")
                  sys.exit(1)
              if not isinstance(msg.get("version"), str) or not msg["version"]:
                  print(f"version field missing or empty: {msg!r}")
                  sys.exit(1)

          print(f"WebSocket OK: handshake and version message received ({msg['version']})")
          EOF
      - name: Dump container logs on failure
        if: failure()
        run: docker logs darkhold-test
      - name: Cleanup
        if: always()
        run: docker rm -f darkhold-test || true

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - commitlint
      - unit-test
      - docker-test
    concurrency: release
    permissions:
      id-token: write
      contents: write

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    if: needs.release.outputs.released == 'true'
    needs:
      - release
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./darkhold
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
