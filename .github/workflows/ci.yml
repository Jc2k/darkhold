name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Make sure commit messages follow the conventional commits convention:
  # https://www.conventionalcommits.org
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: darkhold
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps
      - name: Run frontend unit tests
        run: npm test
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Run server unit tests
        run: deno task test

  docker-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./darkhold
          platforms: ${{ matrix.platform }}
          load: true
          tags: darkhold-test
      - name: Start container
        run: docker run -d --name darkhold-test -p 8099:8099 darkhold-test
      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8099/ > /dev/null 2>&1; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Container failed to start in time"
          docker logs darkhold-test
          exit 1
      - name: Test SPA is served
        run: curl -sf http://localhost:8099/ | grep -q '<html'
      - name: Test WebSocket endpoint
        run: |
          pip install --quiet websockets
          python3 - <<'EOF'
          import asyncio, websockets, json

          async def test():
              async with websockets.connect('ws://localhost:8099/ws') as ws:
                  msg = await asyncio.wait_for(ws.recv(), timeout=5)
                  data = json.loads(msg)
                  assert data.get('type') == 'version', f"Expected version message, got: {data}"
                  print(f"WebSocket OK: version={data['version']}")

          asyncio.run(test())
          EOF
      - name: Dump container logs on failure
        if: failure()
        run: docker logs darkhold-test
      - name: Cleanup
        if: always()
        run: docker rm -f darkhold-test || true

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - commitlint
      - unit-test
      - docker-test
    concurrency: release
    permissions:
      id-token: write
      contents: write

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    if: needs.release.outputs.released == 'true'
    needs:
      - release
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./darkhold
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

