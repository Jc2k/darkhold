name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: darkhold/package-lock.json

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.0
        with:
          deno-version: v2.x

      - name: Install npm dependencies
        working-directory: darkhold
        run: npm ci --legacy-peer-deps
