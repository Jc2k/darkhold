server {
    listen 8099;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream hostnames are resolved
    # at request time rather than at startup (avoids "host not found" errors
    # when the Tandoor add-on hasn't started yet).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Forward /api/ to the Tandoor add-on
    location /api/ {
        set $tandoor_upstream ${TANDOOR_URL};
        proxy_pass $tandoor_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeouts for large recipe imports
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve the SPA - all other paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
