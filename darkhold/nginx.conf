# Inject the configured default token when the client has no personal token.
# The SPA sends "Bearer " (with a trailing space and empty token) when the user
# has not set a personal API token.  The map replaces that – and the case where
# no Authorization header was sent at all – with the operator-supplied default
# so Tandoor authorises read-only requests without per-user setup.
map $http_authorization $effective_authorization {
    default   $http_authorization;
    ""        "Bearer ${TANDOOR_DEFAULT_TOKEN}";
    "Bearer " "Bearer ${TANDOOR_DEFAULT_TOKEN}";
}

server {
    listen 8099;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream hostnames are resolved
    # at request time rather than at startup (avoids "host not found" errors
    # when the Tandoor add-on hasn't started yet).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Forward /api/ to the Tandoor add-on - never cache API responses
    location ^~ /api/ {
        set $tandoor_upstream ${TANDOOR_URL};
        proxy_pass $tandoor_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $effective_authorization;
        # Increase timeouts for large recipe imports
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    # Forward /media/ to the Tandoor add-on (recipe images and other uploads)
    # Tandoor assigns a unique ID to every upload so content at a given URL
    # never changes - cache aggressively and hide any upstream cache headers.
    location ^~ /media/ {
        set $tandoor_upstream ${TANDOOR_URL};
        proxy_pass $tandoor_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # WebSocket broadcast server for cross-instance cache invalidation
    location /ws {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Calendar events endpoint — proxied to the Deno server which fetches and
    # parses the configured iCal feeds.  Never cache; React Query handles it.
    location = /calendar-events {
        proxy_pass http://127.0.0.1:8098;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    # Weather forecast endpoint — proxied to the Deno server which fetches the
    # configured Open-Meteo forecast. Never cache; React Query handles it.
    location = /weather-forecast {
        proxy_pass http://127.0.0.1:8098;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    # Favicons and mascot - cache for 12 hours so browsers revalidate roughly
    # twice a day without hammering the server on every page load.
    # nginx evaluates regex locations in order, so this specific rule wins over
    # the general hashed-assets rule that follows it.
    location ~* ^/(favicon\.(ico|png)|apple-touch-icon\.png|mascot\.png|icons/icon-.*\.png)$ {
        expires 12h;
        add_header Cache-Control "public, max-age=43200, must-revalidate" always;
    }

    # Hashed JS, CSS, font and image assets generated by the build tool all
    # contain a content hash in their filename so they can be cached forever.
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Serve the SPA - all other paths return index.html.
    # The HTML entry point must always be revalidated so users pick up new
    # deployments, but can be served from cache when unchanged (ETag/304).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
