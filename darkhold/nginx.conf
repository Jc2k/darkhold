server {
    listen 8099;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream hostnames are resolved
    # at request time rather than at startup (avoids "host not found" errors
    # when the Tandoor add-on hasn't started yet).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Forward /api/ to the Tandoor add-on - never cache API responses
    location ^~ /api/ {
        set $tandoor_upstream ${TANDOOR_URL};
        proxy_pass $tandoor_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeouts for large recipe imports
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    # Forward /media/ to the Tandoor add-on (recipe images and other uploads)
    # Tandoor assigns a unique ID to every upload so content at a given URL
    # never changes - cache aggressively and hide any upstream cache headers.
    location ^~ /media/ {
        set $tandoor_upstream ${TANDOOR_URL};
        proxy_pass $tandoor_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # WebSocket broadcast server for cross-instance cache invalidation
    location /ws {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Favicons and mascot - cache for 12 hours so browsers revalidate roughly
    # twice a day without hammering the server on every page load.
    # nginx evaluates regex locations in order, so this specific rule wins over
    # the general hashed-assets rule that follows it.
    location ~* ^/(favicon\.(ico|png)|apple-touch-icon\.png|mascot\.png|icons/icon-.*\.png)$ {
        expires 12h;
        add_header Cache-Control "public, max-age=43200, must-revalidate" always;
    }

    # Hashed JS, CSS, font and image assets generated by the build tool all
    # contain a content hash in their filename so they can be cached forever.
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Serve the SPA - all other paths return index.html.
    # The HTML entry point must always be revalidated so users pick up new
    # deployments, but can be served from cache when unchanged (ETag/304).
    #
    # When accessed via Home Assistant ingress, HA sets the X-Ingress-Path
    # request header (e.g. /api/hassio_ingress/<token>).  We inject it into
    # the HTML so the client-side JavaScript can construct WebSocket URLs that
    # include the ingress prefix and are therefore routed correctly by HA.
    # The header value is validated against the expected HA ingress format
    # before injection to prevent unexpected content from reaching the page.
    location / {
        set $ingress_path "";
        if ($http_x_ingress_path ~ "^/api/hassio_ingress/[A-Za-z0-9_-]+$") {
            set $ingress_path $http_x_ingress_path;
        }
        sub_filter_types text/html;
        sub_filter '</head>' '<script>window.__HA_BASE_PATH__="$ingress_path";</script></head>';
        sub_filter_once on;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
