name: "Darkhold"
description: "A mobile-first recipe manager frontend for Tandoor"
version: "1.44.0"
slug: "darkhold"
url: "https://github.com/Jc2k/darkhold"
image: "ghcr.io/jc2k/darkhold"

# Architecture support
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386

# Ingress allows the add-on to be served through the HA proxy
ingress: true
ingress_port: 8099

# Expose the port directly too
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Darkhold web UI"

# Required Home Assistant add-on options
options:
  tandoor_url: "http://tandoor:8080"

schema:
  tandoor_url: "str"
