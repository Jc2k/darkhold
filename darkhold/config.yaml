name: "Darkhold"
description: "A mobile-first recipe manager frontend for Tandoor"
version: "1.69.6"
slug: "darkhold"
url: "https://github.com/Jc2k/darkhold"
image: "ghcr.io/jc2k/darkhold"

# Architecture support
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386

# Ingress allows the add-on to be served through the HA proxy
ingress: true
ingress_port: 8099

# Expose the port directly too
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Darkhold web UI"

# Required Home Assistant add-on options
options:
  tandoor_url: "http://tandoor:8080"
  tandoor_external_url: ""
  tandoor_default_token: ""
  ical_feeds: []
  weather_latitude: 51.5072
  weather_longitude: -0.1276
  weather_timezone: "Europe/London"

schema:
  tandoor_url: "str"
  tandoor_external_url: "str?"
  tandoor_default_token: "str?"
  ical_feeds:
    - name: "str"
      url: "str"
      type: "str?"
      username: "str?"
      password: "str?"
  weather_latitude: "float?"
  weather_longitude: "float?"
  weather_timezone: "str?"
